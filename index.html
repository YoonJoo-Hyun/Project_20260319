<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="취향, 계절, 예산에 맞춰 전 세계 여행지를 추천해주는 큐레이션 사이트입니다.">
    <title>Atlas Finders | 전 세계 여행지 추천</title>
    <link rel="stylesheet" href="style.css?v=2.0">
</head>
<body>
    <div class="page-shell">
        <header class="hero">
            <nav class="topbar">
                <div>
                    <p class="eyebrow">ATLAS FINDERS</p>
                    <h1>전 세계 여행지 추천을 한 번에</h1>
                </div>
                <button class="theme-toggle" id="theme-toggle" type="button" aria-label="테마 전환">Dark mode</button>
            </nav>

            <div class="hero-grid">
                <section class="hero-copy">
                    <p class="lead">
                        휴양, 미식, 도시 탐험, 자연 몰입까지. 여행 스타일과 계절, 예산을 고르면 지금 떠나기 좋은 세계 여행지를 골라드립니다.
                    </p>
                    <div class="hero-stats">
                        <article>
                            <strong>16</strong>
                            <span>추천 도시</span>
                        </article>
                        <article>
                            <strong>6</strong>
                            <span>여행 테마</span>
                        </article>
                        <article>
                            <strong>4</strong>
                            <span>예산 레벨</span>
                        </article>
                    </div>
                </section>

                <section class="control-panel">
                    <div class="panel-header">
                        <p>Trip Matcher</p>
                        <h2>취향에 맞는 여행지 찾기</h2>
                    </div>

                    <form id="travel-form" class="filters">
                        <label>
                            <span>분위기</span>
                            <select id="vibe-select">
                                <option value="any">상관없음</option>
                                <option value="city">도시 탐험</option>
                                <option value="nature">자연과 풍경</option>
                                <option value="beach">해변 휴양</option>
                                <option value="culture">문화와 역사</option>
                                <option value="food">미식 여행</option>
                                <option value="adventure">액티비티</option>
                            </select>
                        </label>

                        <label>
                            <span>예산</span>
                            <select id="budget-select">
                                <option value="any">상관없음</option>
                                <option value="low">가볍게</option>
                                <option value="medium">적당히</option>
                                <option value="high">프리미엄</option>
                                <option value="luxury">럭셔리</option>
                            </select>
                        </label>

                        <label>
                            <span>계절</span>
                            <select id="season-select">
                                <option value="any">상관없음</option>
                                <option value="spring">봄</option>
                                <option value="summer">여름</option>
                                <option value="autumn">가을</option>
                                <option value="winter">겨울</option>
                            </select>
                        </label>

                        <label>
                            <span>여행 기간</span>
                            <select id="duration-select">
                                <option value="any">상관없음</option>
                                <option value="short">3~4일</option>
                                <option value="week">5~8일</option>
                                <option value="long">9일 이상</option>
                            </select>
                        </label>

                        <button id="generate-btn" type="submit">추천 여행지 보기</button>
                    </form>
                </section>
            </div>
        </header>

        <main>
            <section class="results-header">
                <div>
                    <p class="section-kicker">Curated Picks</p>
                    <h2>지금 어울리는 여행지</h2>
                </div>
                <p id="result-summary">필터를 고르면 가장 잘 맞는 여행지 3곳을 보여드립니다.</p>
            </section>

            <section id="recommendations" class="recommendations" aria-live="polite"></section>
        </main>
    </div>

    <script src="main.js?v=2.0"></script>
</body>
</html>
